<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance — JNTUACEA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ─────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink:      #0f0f0f;
  --ink2:     #3a3a3a;
  --ink3:     #7a7a7a;
  --paper:    #f9f7f4;
  --white:    #ffffff;
  --line:     #e4e2de;
  --green:    #1a6b3c;
  --green-bg: #edf7f2;
  --amber:    #92600a;
  --amber-bg: #fef8ed;
  --red:      #9b1c1c;
  --red-bg:   #fef2f2;
  --accent:   #1a6b3c;
}

html { font-size: 16px; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Instrument Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ───────────────────────────────────────── */
header {
  border-bottom: 1px solid var(--line);
  padding: 1.25rem 2rem;
  display: flex;
  align-items: baseline;
  gap: 1rem;
  background: var(--white);
}

.wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--ink);
}

.wordmark span {
  color: var(--accent);
}

.college-tag {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: var(--ink3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ── MAIN ─────────────────────────────────────────── */
main {
  flex: 1;
  width: 100%;
  max-width: 680px;
  margin: 0 auto;
  padding: 3rem 1.5rem 2rem;
}

/* ── LOGIN SECTION ────────────────────────────────── */
#login-section {
  animation: rise 0.5s ease both;
}

.page-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.1rem;
  font-weight: 600;
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 0.5rem;
}

.page-sub {
  font-size: 0.9rem;
  color: var(--ink3);
  margin-bottom: 2.5rem;
  line-height: 1.5;
}

.form-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 2rem;
}

.field {
  margin-bottom: 1.25rem;
}

label {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink3);
  margin-bottom: 0.4rem;
}

input {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.95rem;
  color: var(--ink);
  background: var(--paper);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

input:focus {
  border-color: var(--ink);
  box-shadow: 0 0 0 3px rgba(15,15,15,0.06);
  background: var(--white);
}

input::placeholder { color: #b0aea9; }

.btn {
  width: 100%;
  padding: 0.85rem;
  background: var(--ink);
  color: var(--white);
  border: none;
  border-radius: 8px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.01em;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  margin-top: 0.5rem;
  position: relative;
  overflow: hidden;
}

.btn:hover { background: #2a2a2a; }
.btn:active { transform: scale(0.99); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-loader {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

.error-box {
  display: none;
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  background: var(--red-bg);
  border: 1px solid #fecaca;
  border-radius: 8px;
  font-size: 0.85rem;
  color: var(--red);
  font-family: 'DM Mono', monospace;
}

/* ── DASHBOARD ────────────────────────────────────── */
#dashboard-section { display: none; animation: rise 0.4s ease both; }

.dash-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 2.5rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--line);
}

.student-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.7rem;
  font-weight: 600;
  letter-spacing: -0.3px;
  margin-bottom: 0.2rem;
}

.student-meta {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--ink3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.logout-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--ink3);
  background: none;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 0.4rem 0.8rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.logout-btn:hover { border-color: var(--ink); color: var(--ink); }

/* ── OVERALL CARD ─────────────────────────────────── */
.overall-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 1.75rem;
  margin-bottom: 1rem;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 1rem;
}

.overall-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink3);
  margin-bottom: 0.4rem;
}

.overall-pct {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1;
}

.overall-detail {
  font-size: 0.82rem;
  color: var(--ink3);
  margin-top: 0.3rem;
}

.overall-msg {
  font-size: 0.85rem;
  font-weight: 500;
  margin-top: 0.6rem;
  padding: 0.5rem 0.8rem;
  border-radius: 6px;
  display: inline-block;
}

.msg-safe   { background: var(--green-bg); color: var(--green); }
.msg-warn   { background: var(--amber-bg); color: var(--amber); }
.msg-danger { background: var(--red-bg);   color: var(--red);   }

/* Ring chart */
.ring-wrap { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
.ring-svg { transform: rotate(-90deg); }
.ring-track { fill: none; stroke: var(--line); stroke-width: 7; }
.ring-prog  {
  fill: none;
  stroke-width: 7;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
}
.ring-label {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--ink3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ── STAT STRIP ───────────────────────────────────── */
.stat-strip {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0.75rem;
  margin-bottom: 2rem;
}

.stat-box {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 1rem;
  text-align: center;
}

.stat-val {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 600;
  letter-spacing: -0.5px;
  line-height: 1;
  margin-bottom: 0.25rem;
}

.stat-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ── SUBJECTS ─────────────────────────────────────── */
.section-head {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink3);
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.section-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}

.subject-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }

.subject-row {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.75rem;
  align-items: center;
  transition: border-color 0.15s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.subject-row::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 10px 0 0 10px;
}

.subject-row.safe::before   { background: var(--green); }
.subject-row.warn::before   { background: #d97706; }
.subject-row.danger::before { background: var(--red); }

.subject-row:hover { border-color: #c8c6c2; }

.sub-name {
  font-size: 0.92rem;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 0.2rem;
  line-height: 1.3;
}

.sub-meta {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: var(--ink3);
}

.sub-right { text-align: right; }

.sub-pct {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: -0.5px;
  line-height: 1;
}

.sub-pct.safe   { color: var(--green); }
.sub-pct.warn   { color: var(--amber); }
.sub-pct.danger { color: var(--red); }

.sub-counts {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--ink3);
  margin-top: 0.15rem;
}

/* Progress bar inside subject row */
.sub-bar-wrap {
  height: 3px;
  background: var(--line);
  border-radius: 3px;
  margin-top: 0.5rem;
  overflow: hidden;
}

.sub-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease;
}

.sub-bar.safe   { background: var(--green); }
.sub-bar.warn   { background: #d97706; }
.sub-bar.danger { background: var(--red); }

/* Drill-down panel */
.drill-panel {
  display: none;
  margin-top: 0.5rem;
  border-top: 1px solid var(--line);
  padding-top: 0.75rem;
}

.drill-panel.open { display: block; }

.drill-scroll {
  max-height: 220px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}

.drill-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.3rem 0;
  border-bottom: 1px solid var(--line);
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
}

.drill-row:last-child { border-bottom: none; }

.drill-date { color: var(--ink2); }

.drill-status-p { color: var(--green); font-weight: 500; }
.drill-status-a { color: var(--red);   font-weight: 500; }
.drill-status-o { color: var(--ink3); }

/* ── ALERT STRIP ──────────────────────────────────── */
.alert-strip {
  border-radius: 10px;
  padding: 0.9rem 1.1rem;
  margin-bottom: 1rem;
  font-size: 0.85rem;
  line-height: 1.5;
  border: 1px solid;
}

.alert-safe   { background: var(--green-bg); border-color: #bbf7d0; color: var(--green); }
.alert-warn   { background: var(--amber-bg); border-color: #fde68a; color: var(--amber); }
.alert-danger { background: var(--red-bg);   border-color: #fecaca; color: var(--red);   }

/* ── FOOTER ───────────────────────────────────────── */
footer {
  border-top: 1px solid var(--line);
  padding: 1.5rem 2rem;
  text-align: center;
  background: var(--white);
}

.footer-text {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--ink3);
  letter-spacing: 0.04em;
}

.footer-link {
  color: var(--ink);
  text-decoration: none;
  font-weight: 500;
  border-bottom: 1px solid var(--ink);
  transition: color 0.15s, border-color 0.15s;
}

.footer-link:hover { color: var(--accent); border-color: var(--accent); }

/* ── ANIMATIONS ───────────────────────────────────── */
@keyframes rise {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0);    }
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ───────────────────────────────────── */
@media (max-width: 480px) {
  header { padding: 1rem; }
  main   { padding: 2rem 1rem 1.5rem; }
  .page-title { font-size: 1.7rem; }
  .stat-strip { grid-template-columns: 1fr 1fr; }
  .stat-strip .stat-box:last-child { grid-column: 1 / -1; }
  .overall-pct { font-size: 2.4rem; }
}
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────── -->
<header>
  <div class="wordmark">attend<span>.</span></div>
  <div class="college-tag">JNTUACEA</div>
</header>

<!-- ── MAIN ───────────────────────────────────────── -->
<main>

  <!-- LOGIN -->
  <section id="login-section">
    <h1 class="page-title">Check your<br>attendance.</h1>
    <p class="page-sub">Enter your portal credentials to view a full subject-wise breakdown.</p>

    <div class="form-card">
      <div class="field">
        <label for="username">Roll Number</label>
        <input id="username" type="text" placeholder="e.g. 22BD1A0501" autocomplete="off" spellcheck="false"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Your portal password"/>
      </div>
      <button class="btn" id="check-btn" onclick="fetchAttendance()">
        <span id="btn-text">Check Attendance</span>
        <span class="btn-loader" id="btn-loader">
          <span class="spinner"></span>
          Fetching data…
        </span>
      </button>
      <div class="error-box" id="error-box"></div>
    </div>

    <p style="margin-top:1rem; font-size:0.78rem; color:var(--ink3); text-align:center; font-family:'DM Mono',monospace;">
      Your credentials are used only to fetch data and are never stored.
    </p>
  </section>

  <!-- DASHBOARD -->
  <section id="dashboard-section">

    <!-- Header row -->
    <div class="dash-header">
      <div>
        <div class="student-name" id="d-name"></div>
        <div class="student-meta" id="d-meta"></div>
      </div>
      <button class="logout-btn" onclick="logout()">← Back</button>
    </div>

    <!-- Alerts -->
    <div id="alerts"></div>

    <!-- Overall card -->
    <div class="overall-card" id="overall-card">
      <div>
        <div class="overall-label">Overall Attendance</div>
        <div class="overall-pct" id="d-pct"></div>
        <div class="overall-detail" id="d-detail"></div>
        <div class="overall-msg" id="d-msg"></div>
      </div>
      <div class="ring-wrap">
        <svg class="ring-svg" width="88" height="88" viewBox="0 0 88 88">
          <circle class="ring-track" cx="44" cy="44" r="37"/>
          <circle class="ring-prog" id="ring-prog" cx="44" cy="44" r="37"
            stroke-dasharray="232.5" stroke-dashoffset="232.5"/>
        </svg>
        <div class="ring-label">score</div>
      </div>
    </div>

    <!-- Stat strip -->
    <div class="stat-strip">
      <div class="stat-box">
        <div class="stat-val" id="s-present"></div>
        <div class="stat-lbl">Present</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="s-absent"></div>
        <div class="stat-lbl">Absent</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="s-skip" style="color:var(--green)"></div>
        <div class="stat-lbl">Can Skip</div>
      </div>
    </div>

    <!-- Subjects -->
    <div class="section-head">Subjects</div>
    <div class="subject-list" id="subject-list"></div>

  </section>
</main>

<!-- ── FOOTER ─────────────────────────────────────── -->
<footer>
  <p class="footer-text">
    Developed by&nbsp;
    <a class="footer-link" href="https://www.linkedin.com/in/t-manjunath-27b469381" target="_blank" rel="noopener">
      Manjunath
    </a>
    &nbsp;·&nbsp; CSE AI &amp; ML &nbsp;·&nbsp; JNTUACEA
  </p>
</footer>

<script>
// ── STATE ──────────────────────────────────────────
let currentData = null;

// ── HELPERS ────────────────────────────────────────
const $  = id => document.getElementById(id);
const cl = (pct) => pct >= 85 ? 'safe' : pct >= 75 ? 'warn' : 'danger';

function setLoading(on) {
  $('check-btn').disabled = on;
  $('btn-text').style.display   = on ? 'none'         : 'inline';
  $('btn-loader').style.display = on ? 'inline-flex'  : 'none';
}

function showError(msg) {
  const el = $('error-box');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  $('error-box').style.display = 'none';
}

// ── FETCH ──────────────────────────────────────────
async function fetchAttendance() {
  const username = $('username').value.trim();
  const password = $('password').value.trim();

  hideError();
  if (!username || !password) {
    showError('Please enter both roll number and password.');
    return;
  }

  setLoading(true);

  try {
    const res = await fetch('/api/attendance', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      showError(data.error || 'Something went wrong. Please try again.');
      return;
    }

    currentData = data;
    renderDashboard(data);

  } catch (err) {
    showError('Network error. Please check your connection.');
  } finally {
    setLoading(false);
  }
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchAttendance();
});

// ── RENDER DASHBOARD ───────────────────────────────
function renderDashboard(d) {
  // Student info
  $('d-name').textContent = d.name || d.roll;
  $('d-meta').textContent = [d.roll, d.branch].filter(Boolean).join('  ·  ');

  // Overall %
  const pct = d.overall;
  const c   = cl(pct);
  $('d-pct').textContent = pct + '%';
  $('d-pct').style.color = pctColor(c);
  $('d-detail').textContent = `${d.present} present / ${d.total} total classes`;

  const msgs = {
    safe:   `🔥 Great — you can skip ${d.skip} more class(es) while staying above 75%.`,
    warn:   `⚠️  Buffer is thin — only ${d.skip} class(es) left before dropping below 75%.`,
    danger: `🚨 Critical — attend ${d.need} consecutive class(es) to reach 75%.`,
  };
  const msgEl = $('d-msg');
  msgEl.textContent   = msgs[c];
  msgEl.className     = `overall-msg msg-${c}`;

  // Ring chart
  const circumference = 232.5;
  const offset = circumference - (pct / 100) * circumference;
  const ring = $('ring-prog');
  ring.style.stroke = pctColor(c);
  setTimeout(() => ring.style.strokeDashoffset = offset, 80);

  // Stats
  $('s-present').textContent = d.present;
  $('s-absent').textContent  = d.total - d.present;
  $('s-skip').textContent    = d.skip > 0 ? d.skip : '0';

  // Alerts
  const alertsEl = $('alerts');
  alertsEl.innerHTML = '';
  const below = d.subjects.filter(s => s.percent < 75);
  if (below.length) {
    const names = below.map(s => s.subject.split(' ').slice(0,2).join(' ')).join(', ');
    alertsEl.innerHTML = `
      <div class="alert-strip alert-${below.length > 2 ? 'danger' : 'warn'}">
        <strong>${below.length} subject(s) below 75%:</strong> ${names}
      </div>`;
  } else if (pct >= 85) {
    alertsEl.innerHTML = `<div class="alert-strip alert-safe">All subjects are above 75%. Keep it up!</div>`;
  }

  // Subject list
  const listEl = $('subject-list');
  listEl.innerHTML = '';
  d.subjects.forEach((s, i) => {
    const c2   = cl(s.percent);
    const hint = s.need > 0
      ? `attend ${s.need} more to reach 75%`
      : (s.skip > 0 ? `can skip ${s.skip} more` : 'just at 75%');

    const div = document.createElement('div');
    div.className = `subject-row ${c2}`;
    div.style.animationDelay = `${i * 0.05}s`;
    div.innerHTML = `
      <div>
        <div class="sub-name">${s.subject}</div>
        <div class="sub-meta">${s.present}P / ${s.total}T &nbsp;·&nbsp; ${hint}</div>
        <div class="sub-bar-wrap">
          <div class="sub-bar ${c2}" style="width:0%" data-w="${s.percent}%"></div>
        </div>
        <div class="drill-panel" id="drill-${i}">
          <div class="drill-scroll">
            ${(s.records || []).map(r => `
              <div class="drill-row">
                <span class="drill-date">${r.date}</span>
                <span class="${r.status==='Present'?'drill-status-p':r.status==='Absent'?'drill-status-a':'drill-status-o'}">${r.status}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
      <div class="sub-right">
        <div class="sub-pct ${c2}">${s.percent}%</div>
        <div class="sub-counts">${s.absent} absent</div>
      </div>
    `;

    // Toggle drill-down
    div.addEventListener('click', () => {
      const panel = div.querySelector('.drill-panel');
      panel.classList.toggle('open');
    });

    listEl.appendChild(div);
  });

  // Animate bars after DOM insert
  setTimeout(() => {
    document.querySelectorAll('.sub-bar[data-w]').forEach(el => {
      el.style.width = el.dataset.w;
    });
  }, 100);

  // Show dashboard
  $('login-section').style.display    = 'none';
  $('dashboard-section').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function pctColor(c) {
  return c === 'safe' ? 'var(--green)' : c === 'warn' ? '#d97706' : 'var(--red)';
}

function logout() {
  $('dashboard-section').style.display = 'none';
  $('login-section').style.display     = 'block';
  $('password').value = '';
  currentData = null;
  window.scrollTo({ top: 0 });
}
</script>
</body>
</html>
